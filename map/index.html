<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌿 Global Cannabis Policy Map · 2026</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
    
    #map { height: 100vh; width: 100%; }
    
    .header {
      position: absolute; top: 20px; left: 20px; z-index: 1000;
      background: rgba(15, 23, 42, 0.9); padding: 16px 20px; border-radius: 12px;
      border: 1px solid #334155; max-width: 320px;
    }
    .header h1 { font-size: 1.25rem; margin-bottom: 8px; color: #22c55e; }
    .header p { font-size: 0.9rem; color: #94a3b8; line-height: 1.4; }
    
    .legend {
      position: absolute; bottom: 30px; right: 20px; z-index: 1000;
      background: rgba(15, 23, 42, 0.95); padding: 14px 18px; border-radius: 10px;
      border: 1px solid #334155; min-width: 220px;
    }
    .legend h4 { margin-bottom: 10px; font-size: 0.95rem; color: #cbd5e1; }
    .legend-item { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 0.85rem; }
    .legend-color { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #475569; }
    
    .popup { font-size: 0.9rem; }
    .popup h3 { color: #22c55e; margin-bottom: 8px; font-size: 1.1rem; }
    .popup .status { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; margin: 4px 0; }
    .popup .flags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .popup .flag { font-size: 0.75rem; padding: 2px 6px; background: #1e293b; border-radius: 3px; }
    .popup .notes { margin-top: 8px; color: #94a3b8; font-style: italic; }
    
    .loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15,23,42,0.95); padding: 20px 30px; border-radius: 12px;
      border: 1px solid #334155; z-index: 2000; text-align: center;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <div class="header">
    <h1>🌿 Cannabis Policy Map</h1>
    <p>Global legalization status as of 2026. Click any country for details. Grey = no data available.</p>
  </div>
  
  <div class="legend">
    <h4>Legend</h4>
    <div class="legend-item"><div class="legend-color" style="background:#22c55e"></div>Full Legalization</div>
    <div class="legend-item"><div class="legend-color" style="background:#3b82f6"></div>Medical Positive</div>
    <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div>Decriminalized</div>
    <div class="legend-item"><div class="legend-color" style="background:#84cc16"></div>Home Grow Allowed</div>
    <div class="legend-item"><div class="legend-color" style="background:#a855f7"></div>2026 Reform</div>
    <div class="legend-item"><div class="legend-color" style="background:#c084fc"></div>Future Positive</div>
    <div class="legend-item"><div class="legend-color" style="background:#64748b"></div>No Data</div>
  </div>
  
  <div class="loading" id="loading">Loading map data…</div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    // Color mapping by category
    const colorMap = {
      'Full Legalization': '#22c55e',
      'Medical Positive': '#3b82f6',
      'Decriminalized': '#f59e0b',
      'Home Grow Allowed': '#84cc16',
      '2026 Reform': '#a855f7',
      'Future Positive (2027)': '#c084fc',
      'Future Positive (Discussion)': '#c084fc',
      'Future Positive (2026-2027)': '#c084fc',
      'Medical Only': '#60a5fa',
      'Tolerated': '#fbbf24',
      'No Data': '#64748b'
    };

    // Initialize map
    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      minZoom: 2,
      maxZoom: 6,
      zoomControl: false
    });
    
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    
    // Dark base layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Load GeoJSON
    fetch('cannabis-worldmap.geojson.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        
        L.geoJSON(data, {
          style: feature => ({
            fillColor: colorMap[feature.properties.positive_category] || '#64748b',
            color: '#334155',
            weight: 0.8,
            fillOpacity: 0.85
          }),
          onEachFeature: (feature, layer) => {
            const p = feature.properties;
            const flags = [];
            if (p.home_grow_allowed === 'Yes') flags.push('🏠 Home Grow');
            if (p.medical_allowed === 'Yes') flags.push('⚕️ Medical');
            if (p.recreational_allowed === 'Yes') flags.push('🎉 Recreational');
            if (p.hemp_allowed === 'Yes') flags.push('🌾 Industrial Hemp');
            
            const popupContent = `
              <div class="popup">
                <h3>${p.name}</h3>
                <div class="status" style="background:${colorMap[p.positive_category] || '#64748b'}; color:white">
                  ${p.positive_category}
                </div>
                ${p.status_2026_update ? `<p><strong>2026 Update:</strong> ${p.status_2026_update}</p>` : ''}
                ${p.planned_reform_2027 ? `<p><strong>2027 Outlook:</strong> ${p.planned_reform_2027}</p>` : ''}
                ${flags.length ? `<div class="flags">${flags.map(f => `<span class="flag">${f}</span>`).join('')}</div>` : ''}
                ${p.notes && p.notes !== 'No data available' ? `<div class="notes">📝 ${p.notes}</div>` : ''}
              </div>
            `;
            layer.bindPopup(popupContent);
            
            // Hover effect
            layer.on('mouseover', function(e) {
              this.setStyle({ weight: 2, color: '#fff', fillOpacity: 1 });
            });
            layer.on('mouseout', function(e) {
              this.setStyle({ weight: 0.8, color: '#334155', fillOpacity: 0.85 });
            });
          }
        }).addTo(map);
      })
      .catch(err => {
        document.getElementById('loading').innerHTML = '⚠️ Error loading map data.<br><small>Make sure cannabis-worldmap.geojson.json is in the same folder.</small>';
        console.error(err);
      });
  </script>
</body>
</html>
